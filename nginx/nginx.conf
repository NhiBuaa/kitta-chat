worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 valid=10s ipv6=off;

    # =========================================================
    # LOGGING
    # =========================================================
    log_format main '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'rt=$request_time uct=$upstream_connect_time '
                   'uht=$upstream_header_time urt=$upstream_response_time '
                   'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log main buffer=16k flush=2s;
    error_log  /var/log/nginx/error.log warn;

    # =========================================================
    # PERFORMANCE
    # =========================================================
    sendfile                on;
    tcp_nopush              on;
    tcp_nodelay             on;
    keepalive_timeout       65;
    keepalive_requests      1000;
    types_hash_max_size     2048;
    server_tokens           off;
    client_max_body_size    100m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               text/javascript application/x-javascript;

    # =========================================================
    # VARIABLES
    # =========================================================
    # Map the Connection header for WebSocket upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # =========================================================
    # RATE LIMITING ZONES
    # =========================================================
    # Per IP - General API: 10 req/s
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Per IP - Auth endpoints: 1 req/s (strict)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=1r/s;

    # Per IP - Connection flood protection
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # =========================================================
    # SERVER BLOCK
    # =========================================================
    server {
        listen 80;
        server_name localhost;
        set $backend_upstream backend:3000;

        # ---------- SECURITY HEADERS ----------
        add_header X-Frame-Options       "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                        always;
        add_header X-XSS-Protection      "1; mode=block"                   always;
        add_header Referrer-Policy       "no-referrer-when-downgrade"       always;
        add_header Permissions-Policy     "camera=(self), microphone=(self), geolocation=()" always;

        # ---------- HEALTH CHECK ----------
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK";
        }

        # ---------- FRONTEND: React Static Files ----------
        location / {
            root   /usr/share/nginx/html;
            index  index.html;

            # Cache static assets (React build output có hash trong filename)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
                expires     1y;
                add_header  Cache-Control "public, immutable";
                access_log  off;
            }

            # SPA routing: React Router history API
            try_files $uri $uri/ /index.html;
        }

        # ---------- API: REST Endpoints ----------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://$backend_upstream;
            proxy_http_version 1.1;
            # BẬT keepalive - reuse connection pool
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Forward Origin để Express CORS kiểm tra được origin thật
            proxy_set_header   Accept            $http_origin;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # ---------- AUTH: Stricter rate limit ----------
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass         http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ---------- WEBSOCKET: Socket.IO ----------
        location /socket.io/ {
            limit_conn conn_limit 10;

            proxy_pass         http://$backend_upstream;
            proxy_http_version 1.1;

            # WebSocket upgrade headers - giữ nguyên "upgrade"
            # KHÔNG set Connection "" vì WS cần upgrade
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket timeout phải LỚN - Socket.IO ping/pong ~20s interval
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;

            # TẮT buffering cho WebSocket - CRITICAL
            proxy_buffering off;
        }

        # ---------- ERROR PAGES ----------
        # NOTE: 503 = Rate Limited. Commented out vì /50x.html không tồn tại trong React dist
        # -> rate limited request sẽ nhận 503 trực tiếp từ nginx thay vì 404 ảo
        error_page 500 502 504 /50x.html;
        # error_page 503 444;  # trả thẳng 503, không redirect
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # ---------- BLOCK SUSPICIOUS PATTERNS ----------
        if ($query_string ~* "union.*select.*from") { return 444; }
        if ($request_uri ~* "\.(htaccess|htpasswd|config|bak|orig|old|save|log|sql|xml|csv|mdb|ini|phtml|php|pl|cgi)$") {
            return 444;
        }
    }
}
