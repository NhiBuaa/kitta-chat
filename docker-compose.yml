services:
  # =========================================================
  # NGINX - Reverse Proxy & Load Balancer
  # =========================================================
  nginx:
    image: nginx:alpine
    container_name: chat_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # =========================================================
  # BACKEND
  # =========================================================
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod
    deploy:
      replicas: 3
    restart: on-failure
    environment:
      - NODE_NAME=${NODE_NAME:-backend}
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/shot-chat
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    env_file:
      - ./server/.env
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # =========================================================
  # IMAGE WORKER - RabbitMQ consumer for image processing
  # =========================================================
  image-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod
    restart: on-failure
    command: npm run worker:image
    environment:
      - NODE_NAME=${NODE_NAME:-image-worker}
      - MONGO_URI=mongodb://mongo:27017/shot-chat
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    env_file:
      - ./server/.env
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - chat-network

  # =========================================================
  # NOTIFICATION WORKER - RabbitMQ consumer for email jobs
  # =========================================================
  notification-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod
    restart: on-failure
    command: npm run worker:notification
    environment:
      - NODE_NAME=${NODE_NAME:-notification-worker}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    env_file:
      - ./server/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - chat-network

  # =========================================================
  # AUDIT WORKER - RabbitMQ consumer for audit/statistics jobs
  # =========================================================
  audit-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod
    restart: on-failure
    command: npm run worker:audit
    environment:
      - NODE_NAME=${NODE_NAME:-audit-worker}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
    env_file:
      - ./server/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - chat-network

  # =========================================================
  # REDIS - Pub/Sub & Adapter
  # =========================================================
  redis:
    image: redis:alpine
    container_name: chat_redis
    restart: always
    command: >
      redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - chat-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # =========================================================
  # RABBITMQ - Background job queue
  # =========================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: chat_rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================
  # MONGODB - Database
  # =========================================================
  mongo:
    image: mongo:7
    container_name: chat_mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - chat-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  chat-network:
    driver: bridge

volumes:
  redis_data:
  mongo_data:
  rabbitmq_data:
