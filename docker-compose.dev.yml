services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    deploy:
      replicas: 1
    environment:
      - REDIS_URL=redis://redis:6379
      - CONVERSATION_DUAL_WRITE_ENABLED=false
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules

  client-dev:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: chat_client_dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/
      - VITE_API_URL_AUTH=/api/auth
      - VITE_API_URL_USERS=/api/users
      - VITE_API_URL_MESSAGES=/api/messages
      - VITE_API_URL_GROUPS=/api/groups
      - VITE_API_URL_FILES=/api/files
      - VITE_API_URL_CALLS=/api/calls
      - VITE_PROXY_TARGET=http://nginx
      - VITE_DEFAULT_AVATAR=https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    networks:
      - chat-network

  redis:
    ports:
      - "6379:6379"

  mongo:
    ports:
      - "27017:27017"

volumes:
  backend_node_modules:
  client_node_modules:
