<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title description">
  <title id="title">KittaChat recruiter-level architecture</title>
  <desc id="description">Two React clients connect through nginx to three Express and Socket.IO replicas. Redis distributes realtime events, MongoDB stores durable data, RabbitMQ dispatches asynchronous jobs to workers, and WebRTC media travels directly between clients.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .node-title { font: 700 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .node-copy { font: 400 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .cluster-title { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .edge-label { font: 600 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .legend { font: 600 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow); }
      .replica { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .http { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow-blue); }
      .realtime { fill: none; stroke: #7c3aed; stroke-width: 4; stroke-dasharray: 12 9; marker-end: url(#arrow-purple); }
      .async { fill: none; stroke: #ea580c; stroke-width: 4; stroke-dasharray: 3 10; stroke-linecap: round; marker-end: url(#arrow-orange); }
      .media { fill: none; stroke: #059669; stroke-width: 6; marker-start: url(#arrow-green); marker-end: url(#arrow-green); }
      .data { fill: none; stroke: #475569; stroke-width: 3; marker-end: url(#arrow-slate); }
      .legend-http { stroke: #2563eb; stroke-width: 4; }
      .legend-realtime { stroke: #7c3aed; stroke-width: 4; stroke-dasharray: 12 9; }
      .legend-async { stroke: #ea580c; stroke-width: 4; stroke-dasharray: 3 10; stroke-linecap: round; }
      .legend-media { stroke: #059669; stroke-width: 6; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="#f8fafc"/>
  <text x="70" y="65" class="title">KittaChat Core Realtime Architecture</text>
  <text x="70" y="96" class="subtitle">Three backend replicas share realtime rooms through Redis while MongoDB remains the durable source of truth.</text>

  <g aria-label="React Client A">
    <rect x="70" y="145" width="300" height="125" rx="18" class="box"/>
    <rect x="70" y="145" width="10" height="125" rx="5" fill="#22c55e"/>
    <text x="105" y="192" class="node-title">React Client A</text>
    <text x="105" y="224" class="node-copy">Messaging, presence and calls</text>
  </g>

  <g aria-label="React Client B">
    <rect x="1230" y="145" width="300" height="125" rx="18" class="box"/>
    <rect x="1520" y="145" width="10" height="125" rx="5" fill="#22c55e"/>
    <text x="1265" y="192" class="node-title">React Client B</text>
    <text x="1265" y="224" class="node-copy">Messaging, presence and calls</text>
  </g>

  <path d="M 390 176 C 635 110, 965 110, 1210 176" class="media"/>
  <rect x="650" y="112" width="300" height="34" rx="17" fill="#ecfdf5"/>
  <text x="800" y="135" text-anchor="middle" class="edge-label" fill="#047857">Direct peer-to-peer WebRTC media</text>

  <g aria-label="nginx reverse proxy">
    <rect x="620" y="305" width="360" height="125" rx="18" class="box"/>
    <rect x="620" y="305" width="360" height="9" rx="4" fill="#0ea5e9"/>
    <text x="800" y="355" text-anchor="middle" class="node-title">nginx Reverse Proxy</text>
    <text x="800" y="388" text-anchor="middle" class="node-copy">Frontend, REST and Socket.IO routing</text>
  </g>

  <path d="M 260 270 C 350 330, 470 350, 600 350" class="http"/>
  <text x="390" y="318" class="edge-label" fill="#1d4ed8">HTTP</text>
  <path d="M 1340 270 C 1250 330, 1130 350, 1000 350" class="http"/>
  <path d="M 310 270 C 430 390, 500 405, 610 400" class="realtime"/>
  <text x="350" y="420" class="edge-label" fill="#6d28d9">Socket.IO realtime + signaling</text>
  <path d="M 1290 270 C 1170 390, 1100 405, 990 400" class="realtime"/>

  <g aria-label="Express and Socket.IO cluster">
    <rect x="500" y="500" width="600" height="310" rx="24" fill="#eef2ff" stroke="#818cf8" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="800" y="545" text-anchor="middle" class="cluster-title">Express + Socket.IO Cluster</text>
    <text x="800" y="572" text-anchor="middle" class="node-copy">Docker Compose replicas behind nginx</text>

    <rect x="555" y="600" width="490" height="54" rx="12" class="replica"/>
    <circle cx="590" cy="627" r="9" fill="#22c55e"/>
    <text x="620" y="634" class="node-title">Replica 1</text>

    <rect x="555" y="671" width="490" height="54" rx="12" class="replica"/>
    <circle cx="590" cy="698" r="9" fill="#22c55e"/>
    <text x="620" y="705" class="node-title">Replica 2</text>

    <rect x="555" y="742" width="490" height="54" rx="12" class="replica"/>
    <circle cx="590" cy="769" r="9" fill="#22c55e"/>
    <text x="620" y="776" class="node-title">Replica 3</text>
  </g>

  <path d="M 760 430 L 760 480" class="http"/>
  <path d="M 840 430 L 840 480" class="realtime"/>

  <g aria-label="MongoDB">
    <rect x="70" y="535" width="310" height="135" rx="18" class="box"/>
    <rect x="70" y="535" width="10" height="135" rx="5" fill="#10b981"/>
    <text x="105" y="585" class="node-title">MongoDB</text>
    <text x="105" y="617" class="node-copy">Durable source of truth</text>
    <text x="105" y="643" class="node-copy">Messages, users, groups and calls</text>
  </g>

  <path d="M 500 625 L 400 625" class="data"/>
  <text x="413" y="608" class="edge-label" fill="#334155">Durable reads/writes</text>

  <g aria-label="Redis Adapter">
    <rect x="1220" y="535" width="310" height="135" rx="18" class="box"/>
    <rect x="1520" y="535" width="10" height="135" rx="5" fill="#8b5cf6"/>
    <text x="1255" y="585" class="node-title">Redis Adapter</text>
    <text x="1255" y="617" class="node-copy">Cross-replica room fan-out</text>
    <text x="1255" y="643" class="node-copy">Presence and coordination</text>
  </g>

  <path d="M 1100 625 L 1200 625" class="realtime"/>
  <text x="1115" y="607" class="edge-label" fill="#6d28d9">Pub/sub fan-out</text>

  <g aria-label="RabbitMQ">
    <rect x="255" y="845" width="310" height="120" rx="18" class="box"/>
    <rect x="255" y="845" width="10" height="120" rx="5" fill="#f97316"/>
    <text x="290" y="895" class="node-title">RabbitMQ</text>
    <text x="290" y="927" class="node-copy">Primary, retry and DLQ queues</text>
  </g>

  <g aria-label="Background Workers">
    <rect x="1035" y="845" width="310" height="120" rx="18" class="box"/>
    <rect x="1335" y="845" width="10" height="120" rx="5" fill="#f97316"/>
    <text x="1070" y="895" class="node-title">Background Workers</text>
    <text x="1070" y="927" class="node-copy">Image, notification and audit jobs</text>
  </g>

  <path d="M 650 810 C 600 850, 570 880, 575 900" class="async"/>
  <text x="550" y="837" class="edge-label" fill="#c2410c">Publish jobs</text>
  <path d="M 585 905 L 1015 905" class="async"/>
  <text x="800" y="890" text-anchor="middle" class="edge-label" fill="#c2410c">Delayed retry and DLQ routing</text>
  <g aria-label="Connection legend">
    <rect x="70" y="710" width="400" height="112" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="92" y="740" class="legend">Connection legend</text>
    <line x1="92" y1="765" x2="132" y2="765" class="legend-http"/>
    <text x="148" y="770" class="legend">HTTP request</text>
    <line x1="92" y1="794" x2="132" y2="794" class="legend-realtime"/>
    <text x="148" y="799" class="legend">Socket.IO realtime</text>
    <line x1="275" y1="765" x2="315" y2="765" class="legend-async"/>
    <text x="331" y="770" class="legend">Asynchronous</text>
    <line x1="275" y1="794" x2="315" y2="794" class="legend-media"/>
    <text x="331" y="799" class="legend">WebRTC media</text>
  </g>
</svg>
